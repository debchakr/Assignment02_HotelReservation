server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:reservationdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  redis:
    host: localhost
    port: 6379

logging:
  level:
    com.cgi: INFO
    root: INFO

credit-card:
  base-url: http://localhost:9090/host/credit-card-payment-api